<html lang="es">
<head>

    <title>Visor de Cookies Capturadas</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 1200px;

        .container {
            background-color: white;
            padding: 30px;
            border-radius: 8px;

            color: white;

            margin-bottom: 20px;

        .refresh-btn:hover {
            background-color: #45a049;
        }
        .no-cookies {

            padding: 20px;

    </style>
</head>

    </div>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Society Studios | Inicio</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background-color: #050505;
            background-image: url('./fondo.jpg'); 
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
            background-attachment: fixed;
            color: white; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            overflow-x: hidden;
        }

        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.6); z-index: -1;
        }

        /* BARRA CORREGIDA */
        nav { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 0 5%; 
            height: 80px; 
            background: rgba(0, 0, 0, 0.9); 
            backdrop-filter: blur(10px); 
            position: fixed; 
            width: 100%; 
            top: 0; 
            z-index: 100;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        
        .nav-logo { flex: 1; display: flex; align-items: center; }
        .nav-logo img { height: 45px; width: auto; }

        .nav-links { 
            display: flex; 
            list-style: none; 
            gap: 40px; 
            justify-content: center;
            flex: 2; 
        }

        .nav-links a { 
            color: #ccc; 
            text-decoration: none; 
            font-weight: bold; 
            text-transform: uppercase; 
            font-size: 0.9rem; 
            transition: 0.3s;
        }

        .nav-links a:hover { color: #fff; }

        .nav-right { flex: 1; display: flex; justify-content: flex-end; }
        .btn-discord {
            background: #fff; color: #000; padding: 8px 20px; 
            border-radius: 5px; text-decoration: none; font-weight: bold; font-size: 0.8rem;
        }

        /* CONTENIDO */
        .hero { 
            height: 100vh; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; text-align: center; 
            padding: 20px;
        }
        
        h1 { font-size: 4.5rem; text-shadow: 0 5px 20px rgba(0,0,0,0.8); margin-bottom: 15px; letter-spacing: 2px; }
        p { font-size: 1.2rem; color: #ddd; max-width: 600px; line-height: 1.5; }
    </style>
</head>
<body>

    <div class="overlay"></div>

    <nav>
        <div class="nav-logo">
            <img src="./logo-blacno.jpg" alt="Society Logo">
        </div>

        <ul class="nav-links">
            <li><a href="index.html" style="color: white;">Inicio</a></li>
            <li><a href="eventos.html">Eventos</a></li>
            <li><a href="#">Historia</a></li>
            <li><a href="#">Nosotros</a></li>
        </ul>

        <div class="nav-right">
            <a href="#" class="btn-discord">DISCORD</a>
        </div>
    </nav>

    <div class="hero">
        <h1>SOCIETY STUDIOS</h1>
        <p>Expertos en la creación de experiencias y eventos únicos dentro de Minecraft.</p>
    </div>

</body>
</html>

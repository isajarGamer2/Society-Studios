<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Society Studios | Eventos</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #000 url('fondo.jpg') no-repeat center center fixed; 
            background-size: cover; 
            color: white; 
            font-family: sans-serif; 
        }
        nav { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 15px 5%; background: rgba(0, 0, 0, 0.8); 
            position: fixed; width: 100%; top: 0; 
        }
        .nav-logo img { height: 45px; }
        .nav-links { display: flex; gap: 25px; list-style: none; }
        .nav-links a { color: #ccc; text-decoration: none; font-weight: bold; text-transform: uppercase; }
        .nav-links a:hover { color: #fff; }

        /* Contenido de Eventos */
        .container { 
            padding-top: 120px; display: flex; justify-content: center; 
            min-height: 100vh; background: rgba(0,0,0,0.5); 
        }
        .card { 
            background: rgba(20, 20, 20, 0.9); padding: 30px; border-radius: 15px; 
            display: flex; gap: 30px; max-width: 900px; width: 90%; height: fit-content;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .card img { width: 350px; border-radius: 10px; object-fit: cover; }
        .info h2 { font-size: 2rem; margin-bottom: 10px; }
        .info p { color: #ccc; margin-bottom: 15px; line-height: 1.5; }
        .tag { background: rgba(255,255,255,0.1); padding: 5px 10px; border-radius: 5px; font-size: 0.8rem; }
        
        @media (max-width: 768px) {
            .card { flex-direction: column; align-items: center; text-align: center; }
            .card img { width: 100%; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="nav-logo">
            <img src="logo-blacno.jpg" alt="Logo">
        </div>
        <ul class="nav-links">
            <li><a href="index.html">Inicio</a></li>
            <li><a href="eventos.html">Eventos</a></li>
        </ul>
    </nav>

    <div class="container">
        <div class="card">
            <img src="societysafioestudios.jpg" alt="Society Safio">
            <div class="info">
                <h2>01. Society Safio</h2>
                <p>Primer evento dedsafio multijugador de mucha dificultad inspirado en Dedsafio 3.</p>
                <span class="tag">MUCHA DIFICULTAD</span>
                <span class="tag">MULTIJUGADOR</span>
            </div>
        </div>
    </div>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inicio - Society</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}

    body{
      background:#0b0b0f;
      color:#fff;
      overflow-x:hidden;
    }

    canvas{
      position:fixed;
      top:0;
      left:0;
      z-index:-1;
    }

    header{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:15px 40px;
      position:fixed;
      width:100%;
      top:0;
      background:rgba(20,20,30,0.4);
      backdrop-filter: blur(15px);
      border-bottom:1px solid rgba(255,255,255,0.05);
      z-index:1000;
    }

    .logo img{height:35px}

    nav a{
      margin:0 15px;
      color:#aaa;
      text-decoration:none;
      transition:0.3s;
      font-size:14px;
    }

    nav a:hover{color:#fff}

    .discord-btn{
      background:linear-gradient(45deg,#5865F2,#7b2ff7);
      padding:8px 18px;
      border-radius:25px;
      color:white;
      text-decoration:none;
      transition:0.3s;
    }

    .discord-btn:hover{
      transform:scale(1.05);
      box-shadow:0 0 15px rgba(123,47,247,0.6);
    }

    .hero{
      height:100vh;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      text-align:center;
      background: url('img/fondosocieti.jpg') center/cover no-repeat;
      position:relative;
      padding:0 20px;
    }

    .hero::after{
      content:"";
      position:absolute;
      width:100%;
      height:100%;
      background:linear-gradient(to bottom,rgba(0,0,0,0.4),#0b0b0f);
    }

    .hero-content{position:relative;z-index:2}

    .hero h1{
      font-size:50px;
      font-weight:700;
      margin-bottom:20px;
    }

    .hero-buttons a{
      margin:10px;
      display:inline-block;
      padding:12px 25px;
      border-radius:25px;
      text-decoration:none;
      font-size:14px;
      transition:0.3s;
    }

    .btn-primary{
      background:linear-gradient(45deg,#7b2ff7,#5865F2);
      color:white;
    }

    .btn-secondary{
      border:1px solid rgba(255,255,255,0.2);
      color:white;
    }

    .hero-buttons a:hover{
      transform:scale(1.05);
    }

    @media(max-width:768px){
      .hero h1{font-size:30px}
      nav{display:none}
    }
  </style>
</head>
<body>

<canvas id="particles"></canvas>

<header>
  <div class="logo">
    <img src="img/logo-blanco.jpg">
  </div>

  <nav>
    <a href="index.html">Inicio</a>
    <a href="eventos.html">Eventos</a>
    <a href="historia.html">Historia</a>
    <a href="nosotros.html">Nosotros</a>
    <a href="creditos.html">Créditos</a>
  </nav>

  <a class="discord-btn" href="https://discord.gg/GV8kSsf7">Discord</a>
</header>

<section class="hero">
  <div class="hero-content">
    <h1>Creando experiencias únicas en Minecraft desde 2026</h1>

    <div class="hero-buttons">
      <a href="eventos.html" class="btn-primary">Ver eventos</a>
      <a href="nosotros.html" class="btn-secondary">Conocer más</a>
    </div>
  </div>
</section>

<script>
const canvas = document.getElementById('particles');
const ctx = canvas.getContext('2d');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for(let i=0;i<100;i++){
  particles.push({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    r:Math.random()*2,
    dx:(Math.random()-0.5),
    dy:(Math.random()-0.5)
  });
}

function animate(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  particles.forEach(p=>{
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fillStyle='white';
    ctx.fill();

    p.x+=p.dx;
    p.y+=p.dy;

    if(p.x<0||p.x>canvas.width) p.dx*=-1;
    if(p.y<0||p.y>canvas.height) p.dy*=-1;
  });

  requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>

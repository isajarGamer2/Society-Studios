<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Society Studios | Oficial</title>
    <style>
        /* 1. RESET PARA ELIMINAR ESPACIOS BLANCOS */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            background-color: #000; /* Fondo negro mientras carga la imagen */
            font-family: 'Segoe UI', sans-serif;
            color: white;
            overflow-x: hidden;
        }

        /* 2. EL FONDO GIGANTE (3354 x 1874) */
        .hero-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            /* IMPORTANTE: El nombre debe ser EXACTO al de tu archivo en GitHub */
            background-image: url('fondo.jpg'); 
            background-size: cover;       /* Ajusta la imagen gigante a la pantalla */
            background-position: center;  /* Centra el logo del fondo */
            background-repeat: no-repeat;
            z-index: -2;
            will-change: transform;       /* Ayuda al navegador con imágenes pesadas */
        }

        /* Capa de contraste */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            z-index: -1;
        }

        /* 3. NAVBAR CON EL LOGO BLANCO (Imagen 2) */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 5%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 100;
        }

        .nav-logo img {
            height: 45px; /* Ajusta el tamaño de tu logo blanco arriba */
            width: auto;
            display: block;
        }

        .nav-links {
            display: flex;
            list-style: none;
            gap: 30px;
        }

        .nav-links a {
            color: #ddd;
            text-decoration: none;
            font-weight: 700;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
        }

        .nav-links a:hover {
            color: #fff;
        }

        /* 4. CONTENIDO CENTRAL */
        .main-hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 20px;
        }

        h1 {
            font-size: clamp(2rem, 10vw, 4.5rem);
            letter-spacing: 4px;
            margin-bottom: 15px;
            text-shadow: 0 5px 20px rgba(0,0,0,0.8);
        }

        p {
            font-size: 1.2rem;
            color: #ccc;
            max-width: 700px;
            line-height: 1.6;
        }

        .btn-discord {
            margin-top: 30px;
            background: #fff;
            color: #000;
            padding: 12px 35px;
            border-radius: 5px;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-discord:hover {
            background: #5865f2;
            color: #fff;
            box-shadow: 0 0 20px rgba(88, 101, 242, 0.6);
        }
    </style>
</head>
<body>

    <div class="hero-bg"></div>
    <div class="overlay"></div>

    <nav>
        <div class="nav-logo">
            <img src="logo-blacno.jpg" alt="Society Logo">
        </div>
        <ul class="nav-links">
            <li><a href="#">Inicio</a></li>
            <li><a href="#">Eventos</a></li>
            <li><a href="#">Nosotros</a></li>
            <li><a href="#">Soporte</a></li>
        </ul>
        <a href="#" class="btn-discord">DISCORD</a>
    </nav>

    <section class="main-hero">
        <h1>SOCIETY STUDIOS</h1>
        <p>Creamos experiencias inmersivas y eventos de alto nivel en Minecraft. La aventura comienza aquí.</p>
    </section>

</body>
</html>

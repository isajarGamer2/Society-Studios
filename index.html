<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Society Studios | Oficial</title>
    <style>
        /* Reset básico */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            background-color: #050505; /* Fondo oscuro por si falla la imagen */
            color: white;
            font-family: 'Segoe UI', Roboto, sans-serif;
            overflow-x: hidden;
        }

        /* --- CONTENEDOR DEL FONDO --- */
        .background-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            /* IMPORTANTE: ./ asegura que busque en la raíz de tu GitHub */
            background-image: url('./fondo.jpg'); 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            z-index: -2;
        }

        /* Capa de oscurecimiento */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            z-index: -1;
        }

        /* --- NAVBAR --- */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 5%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-logo img {
            height: 50px;
            width: auto;
            display: block; /* Evita espacios extra */
        }

        .nav-links {
            display: flex;
            list-style: none;
            gap: 25px;
        }

        .nav-links a {
            color: #efefef;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-discord {
            background: #ffffff;
            color: #000;
            padding: 10px 20px;
            border-radius: 5px;
            text-decoration: none;
            font-weight: bold;
            font-size: 12px;
            transition: 0.3s;
        }

        /* --- TEXTO CENTRAL --- */
        .hero {
            height: calc(100vh - 80px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }

        .hero h1 {
            font-size: clamp(2.5rem, 8vw, 4.5rem); /* Tamaño fluido */
            margin-bottom: 15px;
            text-shadow: 0 4px 15px rgba(0,0,0,0.7);
        }

        .hero p {
            font-size: 1.1rem;
            color: #d1d1d1;
            max-width: 650px;
            line-height: 1.5;
        }
    </style>
</head>
<body>

    <div class="background-layer"></div>
    <div class="overlay"></div>

    <nav>
        <div class="nav-logo">
            <img src="./logo-blacno.jpg" alt="Society Logo">
        </div>
        <ul class="nav-links">
            <li><a href="#">Inicio</a></li>
            <li><a href="#">Eventos</a></li>
            <li><a href="#">Nosotros</a></li>
            <li><a href="#">Soporte</a></li>
        </ul>
        <a href="#" class="btn-discord">UNIRSE AL DISCORD</a>
    </nav>

    <main class="hero">
        <h1>SOCIETY STUDIOS</h1>
        <p>Expertos en la creación de experiencias y eventos únicos dentro de Minecraft. Diseñamos mundos donde la aventura no tiene límites.</p>
    </main>

</body>
</html>

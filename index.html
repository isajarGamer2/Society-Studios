<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Society Studios | Oficial</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-text: #ffffff;
            --nav-bg: rgba(0, 0, 0, 0.7);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            font-family: 'Inter', sans-serif;
            background-color: #000;
            color: var(--color-text);
            overflow-x: hidden;
        }

        /* --- FONDO PRINCIPAL (Imagen 1) --- */
        .hero-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('fondo.jpg'); /* Tu Imagen 1 */
            background-size: cover;
            background-position: center;
            z-index: -1;
        }

        /* Capa de oscuridad para que el contenido resalte */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.3);
            z-index: 0;
        }

        /* --- BARRA DE NAVEGACIÓN --- */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 50px;
            background: var(--nav-bg);
            backdrop-filter: blur(10px);
            z-index: 100;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Logo de arriba (Imagen 2) */
        .nav-logo {
            display: flex;
            align-items: center;
        }

        .nav-logo img {
            height: 50px; /* Tamaño del logo blanco arriba */
            width: auto;
            border-radius: 5px;
        }

        .nav-links {
            display: flex;
            list-style: none;
            gap: 30px;
        }

        .nav-links a {
            text-decoration: none;
            color: #ccc;
            font-size: 0.9rem;
            font-weight: 600;
            transition: 0.3s;
            text-transform: uppercase;
        }

        .nav-links a:hover {
            color: #fff;
        }

        .btn-discord {
            background: #fff;
            color: #000;
            padding: 10px 25px;
            border-radius: 5px;
            text-decoration: none;
            font-weight: bold;
            font-size: 0.8rem;
            transition: 0.3s;
        }

        .btn-discord:hover {
            background: #5865F2;
            color: #fff;
        }

        /* --- CONTENIDO CENTRAL --- */
        .content {
            position: relative;
            z-index: 1;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 20px;
        }

        .content h1 {
            font-size: 4rem;
            margin-bottom: 10px;
            text-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        .content p {
            font-size: 1.2rem;
            color: #ddd;
            max-width: 600px;
            margin-bottom: 30px;
        }

        /* Animación suave al cargar */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .content {
            animation: fadeIn 1.2s ease-out;
        }

    </style>
</head>
<body>

    <div class="hero-background"></div>
    <div class="overlay"></div>

    <nav>
        <div class="nav-logo">
            <img src="logo-blanco.jpg" alt="Society Logo">
        </div>
        <ul class="nav-links">
            <li><a href="#">Inicio</a></li>
            <li><a href="#">Eventos</a></li>
            <li><a href="#">Nosotros</a></li>
            <li><a href="#">Soporte</a></li>
        </ul>
        <a href="#" class="btn-discord">UNIRSE AL DISCORD</a>
    </nav>

    <main class="content">
        <h1>SOCIETY STUDIOS</h1>
        <p>Expertos en la creación de experiencias y eventos únicos dentro de Minecraft.</p>
    </main>

</body>
</html>

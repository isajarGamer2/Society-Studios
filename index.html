<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Society Studios | Oficial</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Forzamos que el fondo ocupe todo el espacio */
        html, body {
            width: 100%;
            height: 100%;
            background-color: #000; /* Color de respaldo mientras carga la imagen */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
        }

        /* --- CONFIGURACIÓN PARA IMAGEN GRANDE --- */
        .hero-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            /* IMPORTANTE: Verifica que el archivo se llame exactamente fondo.jpg */
            background-image: url('fondo.jpg'); 
            background-repeat: no-repeat;
            background-position: center center;
            background-size: cover; /* Esto estira la imagen 3354x1874 para que encaje */
            z-index: -2;
        }

        /* Capa de oscuridad para que el texto sea legible */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5); /* Ajusta este 0.5 para más o menos oscuridad */
            z-index: -1;
        }

        /* NAVBAR */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 50px;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .nav-logo img {
            height: 50px;
            width: auto;
        }

        .nav-links {
            display: flex;
            list-style: none;
            gap: 30px;
        }

        .nav-links a {
            color: #fff;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            text-transform: uppercase;
        }

        /* CONTENIDO */
        .main-container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: calc(100vh - 90px);
            text-align: center;
        }

        h1 {
            font-size: 4rem;
            margin-bottom: 10px;
            text-shadow: 0px 4px 20px rgba(0,0,0,0.8);
        }

        p {
            font-size: 1.2rem;
            max-width: 600px;
            color: #ccc;
        }
    </style>
</head>
<body>

    <div class="hero-background"></div>
    <div class="overlay"></div>

    <nav>
        <div class="nav-logo">
            <img src="logo-blacno.jpg" alt="Society Logo">
        </div>
        <ul class="nav-links">
            <li><a href="#">Inicio</a></li>
            <li><a href="#">Eventos</a></li>
            <li><a href="#">Nosotros</a></li>
            <li><a href="#">Soporte</a></li>
        </ul>
        <div style="width: 150px;"></div> </nav>

    <div class="main-container">
        <h1>SOCIETY STUDIOS</h1>
        <p>Expertos en la creación de experiencias y eventos únicos dentro de Minecraft.</p>
    </div>

</body>
</html>

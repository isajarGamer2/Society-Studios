<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Society Studios | Eventos</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            font-family: 'Inter', sans-serif;
            background-color: #000;
            color: white;
            overflow-x: hidden;
        }

        /* --- FONDO --- */
        .background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-image: url('fondo.jpg'); /* Tu fondo morado */
            background-size: cover;
            background-position: center;
            z-index: -2;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0.9) 100%);
            z-index: -1;
        }

        /* --- NAVBAR --- */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 8%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .nav-logo img {
            height: 40px;
        }

        .nav-links {
            display: flex;
            list-style: none;
            gap: 25px;
        }

        .nav-links a {
            text-decoration: none;
            color: #bbb;
            font-size: 0.9rem;
            transition: 0.3s;
        }

        .nav-links a:hover, .nav-links a.active {
            color: white;
        }

        .btn-discord {
            background: white;
            color: black;
            padding: 8px 20px;
            border-radius: 5px;
            text-decoration: none;
            font-weight: bold;
            font-size: 0.8rem;
        }

        /* --- SECCIÓN DE EVENTOS --- */
        .container {
            margin-top: 150px;
            padding: 0 10%;
            display: flex;
            justify-content: center;
        }

        .event-card {
            background: rgba(20, 20, 20, 0.8);
            border-radius: 20px;
            width: 100%;
            max-width: 900px;
            display: flex;
            align-items: center;
            padding: 30px;
            gap: 30px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(5px);
        }

        .event-number {
            font-size: 2.5rem;
            font-weight: bold;
            color: rgba(255, 255, 255, 0.1);
        }

        .event-image {
            width: 350px;
            height: 200px;
            border-radius: 15px;
            overflow: hidden;
            flex-shrink: 0;
        }

        .event-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .event-info {
            flex-grow: 1;
        }

        .event-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .event-info h2 {
            font-size: 1.8rem;
            margin-bottom: 10px;
        }

        .event-year {
            color: #666;
            font-size: 0.9rem;
        }

        .event-description {
            color: #aaa;
            line-height: 1.5;
            margin-bottom: 20px;
            font-size: 1rem;
        }

        .tags {
            display: flex;
            gap: 10px;
        }

        .tag {
            background: rgba(255, 255, 255, 0.05);
            padding: 5px 15px;
            border-radius: 5px;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Responsivo para celulares */
        @media (max-width: 768px) {
            .event-card { flex-direction: column; text-align: center; }
            .event-image { width: 100%; }
            .event-header { flex-direction: column; }
        }
    </style>
</head>
<body>

    <div class="background"></div>
    <div class="overlay"></div>

    <nav>
        <div class="nav-logo">
            <img src="logo-blacno.jpg" alt="Society Logo">
        </div>
        <ul class="nav-links">
            <li><a href="index.html">Inicio</a></li>
            <li><a href="#" class="active">Eventos</a></li>
            <li><a href="#">Historia</a></li>
            <li><a href="#">Nosotros</a></li>
        </ul>
        <a href="#" class="btn-discord">Discord</a>
    </nav>

    <div class="container">
        <div class="event-card">
            <div class="event-number">01</div>
            
            <div class="event-image">
                <img src="societysafioestudios.jpg" alt="Society Safio">
            </div>

            <div class="event-info">
                <div class="event-header">
                    <h2>Society Safio</h2>
                    <span class="event-year">2026</span>
                </div>
                <p class="event-description">
                    Primer evento dedsafio multijugador de mucha dificultad inspirado en dedsafio 3.
                </p>
                <div class="tags">
                    <span class="tag">Mucha Dificultad</span>
                    <span class="tag">Multijugador</span>
                </div>
            </div>
        </div>
    </div>

</body>
</html>

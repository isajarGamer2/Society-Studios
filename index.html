<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Society Studios | Oficial</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            font-family: sans-serif;
            background-color: #000;
            color: white;
            overflow-x: hidden;
        }

        /* FONDO PRINCIPAL */
        .hero-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* Usamos ./ para asegurar que busque en la misma carpeta de GitHub */
            background-image: url('./fondo.jpg'); 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            z-index: -1;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            z-index: 0;
        }

        nav {
            position: fixed;
            top: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 50px;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            z-index: 100;
        }

        .nav-logo img {
            height: 45px;
            width: auto;
        }

        .nav-links {
            display: flex;
            list-style: none;
            gap: 25px;
        }

        .nav-links a {
            text-decoration: none;
            color: #ddd;
            font-size: 0.85rem;
            font-weight: bold;
            text-transform: uppercase;
        }

        .btn-discord {
            background: #fff;
            color: #000;
            padding: 8px 20px;
            border-radius: 4px;
            text-decoration: none;
            font-weight: bold;
            font-size: 0.75rem;
        }

        .content {
            position: relative;
            z-index: 1;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .content h1 {
            font-size: 3.5rem;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }

        .content p {
            font-size: 1.1rem;
            color: #ccc;
            max-width: 500px;
        }
    </style>
</head>
<body>

    <div class="hero-background"></div>
    <div class="overlay"></div>

    <nav>
        <div class="nav-logo">
            <img src="./logo-blacno.jpg" alt="Society Logo">
        </div>
        <ul class="nav-links">
            <li><a href="#">Inicio</a></li>
            <li><a href="#">Eventos</a></li>
            <li><a href="#">Nosotros</a></li>
            <li><a href="#">Soporte</a></li>
        </ul>
        <a href="#" class="btn-discord">UNIRSE AL DISCORD</a>
    </nav>

    <main class="content">
        <h1>SOCIETY STUDIOS</h1>
        <p>Expertos en la creación de experiencias y eventos únicos dentro de Minecraft.</p>
    </main>

</body>
</html>

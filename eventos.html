<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Society Studios | Eventos</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background-color: #050505;
            /* FONDO LIMPIO PARA EVENTOS */
            background-image: url('./fondo.jpg'); 
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
            background-attachment: fixed;
            color: white; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
        }

        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.7); z-index: -1; }

        nav { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 0 5%; height: 80px; background: rgba(0, 0, 0, 0.9); 
            backdrop-filter: blur(10px); position: fixed; width: 100%; top: 0; 
            z-index: 100; border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        
        .nav-logo { flex: 1; display: flex; align-items: center; }
        .nav-logo img { height: 45px; width: auto; }

        .nav-links { display: flex; list-style: none; gap: 40px; justify-content: center; flex: 2; }
        .nav-links a { color: #ccc; text-decoration: none; font-weight: bold; text-transform: uppercase; font-size: 0.9rem; transition: 0.3s; }
        .nav-links a:hover { color: #fff; }

        .nav-right { flex: 1; display: flex; justify-content: flex-end; }
        .btn-discord-nav { background: #fff; color: #000; padding: 8px 20px; border-radius: 5px; text-decoration: none; font-weight: bold; font-size: 0.8rem; }

        .container { padding-top: 150px; display: flex; justify-content: center; min-height: 100vh; padding-bottom: 50px; }
        .card { 
            background: rgba(20, 20, 20, 0.85); padding: 30px; border-radius: 20px; 
            display: flex; align-items: center; gap: 30px; max-width: 950px; width: 90%; 
            border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(5px);
        }
        .card img { width: 380px; border-radius: 12px; object-fit: cover; }
        .info h2 { font-size: 2rem; margin-bottom: 10px; }
        .info p { color: #bbb; margin-bottom: 25px; line-height: 1.6; }
        .tag { background: rgba(255,255,255,0.05); padding: 6px 15px; border-radius: 6px; font-size: 0.7rem; text-transform: uppercase; border: 1px solid rgba(255,255,255,0.1); margin-right: 5px; }
        
        @media (max-width: 900px) { .card { flex-direction: column; text-align: center; } .card img { width: 100%; } }
    </style>
</head>
<body>
    <div class="overlay"></div>
    <nav>
        <div class="nav-logo"><img src="./logo-blacno.jpg" alt="Society Logo"></div>
        <ul class="nav-links">
            <li><a href="index.html">Inicio</a></li>
            <li><a href="eventos.html" style="color: white;">Eventos</a></li>
            <li><a href="#">Historia</a></li>
            <li><a href="#">Nosotros</a></li>
        </ul>
        <div class="nav-right"><a href="https://discord.gg/PagKyaJ7" target="_blank" class="btn-discord-nav">DISCORD</a></div>
    </nav>

    <div class="container">
        <div class="card">
            <img src="./societysafioestudios.jpg" alt="Society Safio">
            <div class="info">
                <h2>Society Safio</h2>
                <p>Primer evento dedsafio multijugador de mucha dificultad inspirado en dedsafio 3.</p>
                <div class="tags">
                    <span class="tag">MUCHA DIFICULTAD</span>
                    <span class="tag">MULTIJUGADOR</span>
                </div>
            </div>
        </div>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eventos - Society</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}

    body{
      background:#0b0b0f;
      color:#fff;
    }

    header{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:15px 40px;
      background:rgba(20,20,30,0.4);
      backdrop-filter: blur(15px);
      border-bottom:1px solid rgba(255,255,255,0.05);
    }

    .logo img{height:35px}

    nav a{
      margin:0 15px;
      color:#aaa;
      text-decoration:none;
      transition:0.3s;
    }

    nav a:hover{color:#fff}

    .title{
      text-align:center;
      margin-top:50px;
      font-size:35px;
      font-weight:700;
    }

    .container{
      display:flex;
      justify-content:center;
      margin-top:40px;
    }

    .card{
      display:flex;
      background:rgba(20,20,30,0.6);
      padding:20px;
      border-radius:20px;
      width:800px;
      gap:20px;
      backdrop-filter:blur(15px);
      transition:0.3s;
    }

    .card:hover{
      transform:scale(1.03);
      box-shadow:0 0 30px rgba(123,47,247,0.4);
    }

    .card img{
      width:250px;
      border-radius:15px;
    }

    .btn{
      margin-top:10px;
      display:inline-block;
      padding:10px 20px;
      border-radius:20px;
      background:linear-gradient(45deg,#7b2ff7,#5865F2);
      color:white;
      text-decoration:none;
    }

  </style>
</head>

<body>

<header>
  <div class="logo">
    <img src="img/logo-blanco.jpg">
  </div>

  <nav>
    <a href="index.html">Inicio</a>
    <a href="eventos.html">Eventos</a>
    <a href="historia.html">Historia</a>
    <a href="nosotros.html">Nosotros</a>
    <a href="creditos.html">Créditos</a>
  </nav>
</header>

<div class="title">Eventos</div>

<div class="container">
  <div class="card">
    <img src="img/desafio3.png" alt="Desafío 3">

    <div>
      <h2>Desafío 3</h2>
      <p style="color:#aaa">
        Evento extremo de supervivencia con mecánicas únicas, alta dificultad y desafíos constantes.
      </p>

      <a href="#" class="btn">Ver más</a>
    </div>
  </div>
</div>

</body>
</html>

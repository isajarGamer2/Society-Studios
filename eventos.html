<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Society Studios | Eventos</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background-color: #050505;
            background-image: url('./fondo.jpg'); 
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
            background-attachment: fixed;
            color: white; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
        }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.7); z-index: -1; }
        
        nav { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 0 5%; height: 85px; background: rgba(0, 0, 0, 0.95); 
            backdrop-filter: blur(10px); position: fixed; width: 100%; top: 0; 
            z-index: 100; border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .nav-left { flex: 1; display: flex; align-items: center; }
        .nav-left img { height: 40px; width: auto; }
        .nav-center { display: flex; list-style: none; gap: 30px; align-items: center; }
        .nav-center a { color: #888; text-decoration: none; font-weight: 600; font-size: 0.85rem; transition: 0.3s; position: relative; padding-bottom: 5px; }
        .nav-center a.active { color: white; border-bottom: 2px solid white; }
        .nav-center a:hover { color: white; }
        .nav-right { flex: 1; display: flex; justify-content: flex-end; align-items: center; gap: 15px; }
        .social-box { display: flex; gap: 10px; border-right: 1px solid rgba(255,255,255,0.1); padding-right: 20px; }
        .social-icon { width: 35px; height: 35px; background: rgba(255,255,255,0.05); border-radius: 8px; display: flex; align-items: center; justify-content: center; color: #ccc; text-decoration: none; font-size: 1.1rem; transition: 0.3s; border: 1px solid rgba(255,255,255,0.05); }
        .btn-discord-nav { background: #fff; color: #000; padding: 10px 25px; border-radius: 8px; text-decoration: none; font-weight: bold; font-size: 0.85rem; }

        .event-header { padding: 160px 10% 60px; text-align: left; }
        .portfolio-label { color: #555; text-transform: uppercase; letter-spacing: 2px; font-size: 0.75rem; font-weight: bold; margin-bottom: 10px; }
        h1 { font-size: 3rem; margin-bottom: 10px; }
        .container { display: flex; justify-content: center; padding-bottom: 80px; }
        .card { background: rgba(20, 20, 20, 0.6); padding: 30px; border-radius: 15px; display: flex; align-items: center; gap: 30px; max-width: 900px; width: 95%; border: 1px solid rgba(255,255,255,0.05); }
        .card img { width: 350px; border-radius: 10px; object-fit: cover; }
        .info-top { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 10px; }
        .info p { color: #999; line-height: 1.5; margin-bottom: 20px; }
        .tag { background: rgba(255,255,255,0.05); padding: 5px 12px; border-radius: 20px; font-size: 0.65rem; color: #777; border: 1px solid rgba(255,255,255,0.1); margin-right: 5px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="overlay"></div>
    <nav>
        <div class="nav-left"><img src="./fondo-blacno.jpg" alt="Society Logo"></div>
        <ul class="nav-center">
            <li><a href="index.html">Inicio</a></li>
            <li><a href="eventos.html" class="active">Eventos</a></li>
            <li><a href="#">Historia</a></li>
            <li><a href="#">Nosotros</a></li>
            <li><a href="#">Créditos</a></li>
        </ul>
        <div class="nav-right">
            <div class="social-box">
                <a href="https://www.tiktok.com/@studios_de_society" target="_blank" class="social-icon"><i class="fab fa-tiktok"></i></a>
                <a href="https://discord.gg/PagKyaJ7" target="_blank" class="social-icon"><i class="fab fa-discord"></i></a>
            </div>
            <a href="https://discord.gg/PagKyaJ7" target="_blank" class="btn-discord-nav">Discord</a>
        </div>
    </nav>

    <header class="event-header">
        <div class="portfolio-label">Portfolio</div>
        <h1>Nuestros Eventos</h1>
        <p>Una colección de eventos únicos creados para la comunidad.</p>
    </header>

    <div class="container">
        <div class="card">
            <img src="./societysafioestudios.jpg" alt="Society Safio">
            <div class="info">
                <div class="info-top">
                    <h2>Society Safio</h2>
                    <span style="color: #444; font-weight: bold; font-size: 0.8rem;">2026</span>
                </div>
                <p>Primer evento multijugador de mucha dificultad inspirado en Dedsafio 3.</p>
                <div class="tags">
                    <span class="tag">MUCHA DIFICULTAD</span>
                    <span class="tag">MULTIJUGADOR</span>
                </div>
            </div>
        </div>
    </div>
</body>
</html>

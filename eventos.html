<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Eventos | Society Safio</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      background: #0f0f0f;
      color: white;
    }

    /* 🔥 BARRA FIJA */
    .navbar {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 70px;
      background: #111;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      border-bottom: 1px solid #333;
    }

    .nav-links {
      display: flex;
      gap: 25px;
      list-style: none;
      margin: 0;
      padding: 0;
    }

    .nav-links a {
      color: white;
      text-decoration: none;
      font-size: 18px;
      padding: 10px 15px;
      transition: 0.3s;
      border-radius: 8px;
    }

    .nav-links a:hover {
      background: white;
      color: black;
    }

    /* 🔥 CONTENIDO */
    .content {
      padding-top: 100px;
      text-align: center;
    }

    .title {
      font-size: 50px;
      font-weight: bold;
      color: #00ffcc;
      margin-bottom: 20px;
      text-shadow: 0 0 10px #00ffcc;
    }

    .event-box {
      background: #1a1a1a;
      width: 80%;
      max-width: 600px;
      margin: 20px auto;
      padding: 20px;
      border-radius: 15px;
      border: 1px solid #333;
      box-shadow: 0 0 10px rgba(0,255,204,0.2);
    }

    .event-box h2 {
      color: #00ffcc;
      margin-bottom: 10px;
    }

    .event-box p {
      color: #ccc;
    }

    .btn {
      display: inline-block;
      margin-top: 10px;
      padding: 10px 20px;
      background: #00ffcc;
      color: black;
      text-decoration: none;
      border-radius: 10px;
      font-weight: bold;
      transition: 0.3s;
    }

    .btn:hover {
      background: white;
    }
  </style>
</head>

<body>

  <!-- 🔥 NAVBAR -->
  <div class="navbar">
    <ul class="nav-links">
      <li><a href="index.html">Inicio</a></li>
      <li><a href="eventos.html">Eventos</a></li>
      <li><a href="historia.html">Historia</a></li>
      <li><a href="nosotros.html">Nosotros</a></li>
      <li><a href="creditos.html">Créditos</a></li>
    </ul>
  </div>

  <!-- 🔥 CONTENIDO -->
  <div class="content">
    <div class="title">EVENTOS</div>

    <div class="event-box">
      <h2>🔥 Evento Desafío 3</h2>
      <p>Participa en el desafío más extremo del server. Solo los mejores sobreviven.</p>
      <a class="btn" href="#">Entrar</a>
    </div>

    <div class="event-box">
      <h2>⚔ Torneo PvP</h2>
      <p>Demuestra quién es el más fuerte en combates 1v1.</p>
      <a class="btn" href="#">Entrar</a>
    </div>

  </div>

</body>
</html>

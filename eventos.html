<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Society Studios | Eventos</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background-color: #050505;
            background-image: url('./fondo.jpg'); 
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
            background-attachment: fixed;
            color: white; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
        }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.7); z-index: -1; }
        nav { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 0 5%; height: 80px; background: rgba(0, 0, 0, 0.9); 
            backdrop-filter: blur(10px); position: fixed; width: 100%; top: 0; 
            z-index: 100; border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .nav-logo img { height: 45px; width: auto; }
        .nav-links { display: flex; list-style: none; gap: 40px; justify-content: center; flex: 2; }
        .nav-links a { color: #ccc; text-decoration: none; font-weight: bold; text-transform: uppercase; font-size: 0.9rem; transition: 0.3s; }
        .nav-links a:hover { color: #fff; }
        .btn-discord-nav { background: #fff; color: #000; padding: 8px 20px; border-radius: 5px; text-decoration: none; font-weight: bold; font-size: 0.8rem; }

        /* CABECERA DE EVENTOS ESTILO PIXEL */
        .event-header { padding: 160px 10% 60px; text-align: left; }
        .event-header .portfolio-label { color: #555; text-transform: uppercase; letter-spacing: 2px; font-size: 0.75rem; font-weight: bold; margin-bottom: 10px; }
        .event-header h1 { font-size: 3rem; margin-bottom: 10px; }
        .event-header p { color: #888; font-size: 1.1rem; }

        .container { display: flex; justify-content: center; padding-bottom: 80px; }
        .card { 
            background: rgba(20, 20, 20, 0.6); padding: 30px; border-radius: 15px; 
            display: flex; align-items: center; gap: 30px; max-width: 900px; width: 95%; 
            border: 1px solid rgba(255,255,255,0.05);
        }
        .event-num { font-size: 1.5rem; color: rgba(255,255,255,0.1); font-weight: bold; margin-right: 10px; }
        .card img { width: 350px; border-radius: 10px; object-fit: cover; }
        .info { flex: 1; }
        .info-top { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 10px; }
        .info h2 { font-size: 1.8rem; }
        .info .year { color: #444; font-size: 0.8rem; font-weight: bold; }
        .info p { color: #999; line-height: 1.5; margin-bottom: 20px; font-size: 0.95rem; }
        .tags { display: flex; gap: 10px; }
        .tag { background: rgba(255,255,255,0.05); padding: 5px 12px; border-radius: 20px; font-size: 0.65rem; color: #777; border: 1px solid rgba(255,255,255,0.1); font-weight: bold; }
        
        @media (max-width: 800px) { .card { flex-direction: column; text-align: center; } .card img { width: 100%; } }
    </style>
</head>
<body>
    <div class="overlay"></div>
    <nav>
        <div class="nav-logo"><img src="./fondo-blacno.jpg" alt="Society Logo"></div>
        <ul class="nav-links">
            <li><a href="index.html">Inicio</a></li>
            <li><a href="eventos.html" style="color: white;">Eventos</a></li>
            <li><a href="#">Historia</a></li>
            <li><a href="#">Nosotros</a></li>
        </ul>
        <div class="nav-right"><a href="https://discord.gg/PagKyaJ7" target="_blank" class="btn-discord-nav">DISCORD</a></div>
    </nav>

    <header class="event-header">
        <div class="portfolio-label">Portfolio</div>
        <h1>Nuestros Eventos</h1>
        <p>Una colección de más de 1 evento único creado para la comunidad</p>
    </header>

    <div class="container">
        <div class="card">
            <div class="event-num">01</div>
            <img src="./societysafioestudios.jpg" alt="Society Safio">
            <div class="info">
                <div class="info-top">
                    <h2>Society Safio</h2>
                    <span class="year">2026</span>
                </div>
                <p>Primer evento multijugador de mucha dificultad inspirado en Dedsafio 3.</p>
                <div class="tags">
                    <span class="tag">MUCHA DIFICULTAD</span>
                    <span class="tag">MULTIJUGADOR</span>
                </div>
            </div>
        </div>
    </div>
</body>
</html>

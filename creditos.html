<!DOCTYPE html>

<head>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background-color: #050505;
            background-image: url('./fondo.jpg'); 
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
            background-attachment: fixed;
            color: white; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
        }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.8); z-index: -1; }
        
        /* NAVEGACIÓN CENTRADA */
        nav { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 0 5%; height: 85px; background: rgba(0, 0, 0, 0.95); 
            backdrop-filter: blur(10px); position: fixed; width: 100%; top: 0; 
            z-index: 100; border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .nav-left { flex: 1; display: flex; align-items: center; }
        .nav-left img { height: 40px; width: auto; }

        .nav-center { display: flex; list-style: none; gap: 30px; align-items: center; flex: 2; justify-content: center; }
        .nav-center a { color: #888; text-decoration: none; font-weight: 600; font-size: 0.85rem; transition: 0.3s; position: relative; }
        .nav-center a.active { color: white; }
        .nav-center a.active::after { content: ''; position: absolute; bottom: -8px; left: 0; width: 100%; height: 2px; background: white; }

        .nav-right { flex: 1; display: flex; justify-content: flex-end; align-items: center; gap: 15px; }
        .social-box { display: flex; gap: 10px; border-right: 1px solid rgba(255,255,255,0.1); padding-right: 20px; }
        .social-icon { width: 35px; height: 35px; background: rgba(255,255,255,0.05); border-radius: 8px; display: flex; align-items: center; justify-content: center; color: #ccc; text-decoration: none; border: 1px solid rgba(255,255,255,0.05); }
        .btn-discord-nav { background: #fff; color: #000 !important; padding: 10px 25px; border-radius: 8px; text-decoration: none; font-weight: bold; font-size: 0.85rem; }

        /* CRÉDITOS */
        .credits-container { padding: 160px 10% 100px; text-align: center; }
        h1 { font-size: 3rem; margin-bottom: 40px; }

        .main-card {
            background: rgba(20, 20, 20, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            max-width: 450px;
            margin: 0 auto 40px;
            padding: 40px;
            border-radius: 20px;
            transition: 0.3s;
        }
        .main-card:hover { border-color: #5865F2; transform: translateY(-5px); }
        .avatar-l { width: 150px; height: 150px; border-radius: 50%; border: 4px solid #5865F2; margin-bottom: 20px; object-fit: cover; }

        .sub-card {
            background: rgba(20, 20, 20, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.05);
            max-width: 280px;
            margin: 0 auto;
            padding: 15px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            text-align: left;
        }
        .avatar-s { width: 50px; height: 50px; border-radius: 50%; border: 2px solid #aaa; object-fit: cover; }
        .sub-card h3 { font-size: 0.95rem; }
        .sub-card span { font-size: 0.75rem; color: #666; }
    </style>
</head>
<body>

        <div class="nav-right">
            <div class="social-box">
                <a href="https://www.tiktok.com/@studios_de_society" class="social-icon"><i class="fab fa-tiktok"></i></a>
                <a href="https://discord.gg/PagKyaJ7" class="social-icon"><i class="fab fa-discord"></i></a>
            </div>
            <a href="https://discord.gg/PagKyaJ7" class="btn-discord-nav">Discord</a>
        </div>
    </nav>

    <div class="credits-container">

            </div>
        </div>
    </div>
</body>
</html>
